  p{font-weight:500;font-size:16px;margin-bottom:14px;opacity:.9}
  ul{margin:0 0 16px 20px}
  li{font-weight:500;font-size:16px;margin-bottom:8px;opacity:.9}
  b{color:var(--gold);font-weight:700}

  footer{border-top:1px solid var(--line);padding:28px 20px;text-align:center;
