<!DOCTYPE html>
<html lang="de"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Willkommen — Trainer's Boardroom</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Rajdhani',sans-serif}
  :root{--bg:#0E0E0E;--gold:#C9A84C;--text:#F2F2F2;--line:#2A2A2A}
  body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{text-decoration:none;color:inherit}
  .nav{height:64px;display:flex;align-items:center;padding:0 clamp(18px,4vw,28px);border-bottom:1px solid var(--line)}
  .logo{font-weight:700;font-size:16px;letter-spacing:1.4px}.logo b{color:var(--gold)}
  main{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:60px 24px;position:relative;overflow:hidden}
  .glow{position:absolute;left:50%;top:50%;width:640px;height:640px;transform:translate(-50%,-50%);
    background:radial-gradient(circle,rgba(201,168,76,.14),transparent 62%);pointer-events:none}
  .box{position:relative;z-index:1;max-width:600px}
  .check{width:76px;height:76px;margin:0 auto 26px}
  h1{font-weight:700;font-size:clamp(32px,6vw,54px);line-height:1.05}
  h1 .g{color:var(--gold)}
  p{font-weight:500;font-size:clamp(17px,2.4vw,20px);line-height:1.55;opacity:.9;margin-top:22px}
  .note{margin-top:24px;font-size:16px;opacity:.6}
  .btn{display:inline-block;margin-top:34px;font-weight:700;font-size:15px;letter-spacing:.4px;
    padding:14px 30px;border-radius:12px;border:1px solid var(--gold);color:var(--gold);transition:.15s}
  .btn:hover{background:var(--gold);color:#171308}
  .lang{position:absolute;top:20px;right:clamp(18px,4vw,28px);display:flex;gap:2px;z-index:2}
  .lang button{font-family:inherit;background:none;border:none;cursor:pointer;color:var(--text);
    font-weight:700;font-size:12.5px;padding:6px 7px;opacity:.5}
  .lang button.on{color:var(--gold);opacity:1}
</style></head><body>
  <nav class="nav"><a href="/" class="logo">TRAINER'S <b>BOARDROOM</b></a></nav>
  <div class="lang"><button data-l="de">DE</button><button data-l="en">EN</button><button data-l="hr">HR</button></div>
  <main><div class="glow"></div><div class="box">
    <svg class="check" viewBox="0 0 52 52" aria-hidden="true"><circle cx="26" cy="26" r="24" fill="none" stroke="#C9A84C" stroke-width="2.5"/><path fill="none" stroke="#C9A84C" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" d="M15 27l7 7 15-16"/></svg>
    <h1 id="wh"></h1>
    <p id="wp"></p>
    <p class="note" id="wn"></p>
    <a href="/" class="btn" id="wb"></a>
  </div></main>
<script>
var T={
 de:{h:'Du bist dabei.<br><span class="g">Willkommen im Boardroom.</span>',
     p:'Deinen Einladungslink schicke ich dir so schnell wie m\u00f6glich per E-Mail.',
     n:'Schau bitte auch im Spam-Ordner nach.',
     b:'Zur Startseite'},
 en:{h:'You\u2019re in.<br><span class="g">Welcome to the Boardroom.</span>',
     p:'I\u2019ll email you your invite link as soon as I can.',
     n:'Please check your spam folder too.',
     b:'Back to homepage'},
 hr:{h:'Prijavljen si.<br><span class="g">Dobrodo\u0161ao u Boardroom.</span>',
     p:'Link ti \u0161aljem na e-mail \u010dim prije.',
     n:'Provjeri i mapu ne\u017eeljene po\u0161te.',
     b:'Na naslovnicu'}};
var L='de',nl=(navigator.language||'de').toLowerCase();
if(nl.indexOf('hr')===0)L='hr'; else if(nl.indexOf('en')===0)L='en';
function ap(l){L=l;document.documentElement.lang=l;
  wh.innerHTML=T[l].h; wp.innerHTML=T[l].p; wn.innerHTML=T[l].n; wb.textContent=T[l].b;
  document.querySelectorAll('.lang button').forEach(function(b){b.className=b.getAttribute('data-l')===l?'on':'';});}
document.querySelectorAll('.lang button').forEach(function(b){b.addEventListener('click',function(){ap(b.getAttribute('data-l'));});});
ap(L);
</script>
</body></html>
